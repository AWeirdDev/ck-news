name: Generate and Deploy Site

on:
  schedule:
    - cron: "0 * * * *" # Every hour
  workflow_dispatch: # Allow manual runs

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv pip install --system -r dev-requirements.txt

      - name: Run gen.py
        run: python gen.py

      - name: Adds some shit
        run: |
          echo "title: 你大建中\ntheme: minima" >> site/_config.yml

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Install Jekyll
        run: gem install jekyll bundler

      - name: Build with Jekyll
        run: jekyll build --source site/ --destination site/_site/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/_site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
